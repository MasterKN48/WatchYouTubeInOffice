<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f52b2" />
      <stop offset="100%" stop-color="#7f85f5" />
    </linearGradient>
    <linearGradient id="yt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4e50" />
      <stop offset="100%" stop-color="#f9d423" />
    </linearGradient>
    <linearGradient id="teams-bubble-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b3b4d" />
      <stop offset="100%" stop-color="#1f1f2e" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base Rounded Rectangle (Teams Theme Color) -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bg-grad)" filter="url(#shadow)" />

  <!-- Teams Colleague Silhouette in background -->
  <g opacity="0.35">
    <circle cx="45" cy="50" r="16" fill="#ffffff" />
    <path d="M15,92 C15,74 28,70 45,70 C62,70 75,74 75,92 Z" fill="#ffffff" />
    
    <circle cx="83" cy="50" r="16" fill="#ffffff" />
    <path d="M53,92 C53,74 66,70 83,70 C100,70 113,74 113,92 Z" fill="#ffffff" />
  </g>

  <!-- YouTube Play Button Badge (stealthy overlay) in center-foreground -->
  <rect x="28" y="28" width="72" height="72" rx="18" fill="url(#teams-bubble-grad)" stroke="#ffffff" stroke-width="4" filter="url(#shadow)" />

  <!-- Play Symbol (Red/Orange YouTube gradient) -->
  <path d="M52,44 L52,84 L84,64 Z" fill="url(#yt-grad)" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />

  <!-- Small Teams Green status indicator badge -->
  <circle cx="92" cy="92" r="10" fill="#4caf50" stroke="#ffffff" stroke-width="3" />
</svg>